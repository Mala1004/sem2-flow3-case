<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Interaktiv frontend-udvikling - according</title>
    <style>
      .faq {
        width: 300px;
      }
      .answer {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.2s ease;
      }

      .answer.show {
        max-height: 200px;
      }
    </style>
  </head>

  <body>
    <div class="faq">
      <button id="question1">Hvilke størrelser har I?</button>
      <div class="answer" id="answer1">
        Vi tilbyder størrelser fra XS til XXL på de fleste produkter.
      </div>

      <button id="question2">Hvordan vasker jeg mine t-shirts?</button>
      <div class="answer" id="answer2">
        Vi anbefaler vask ved 30 grader og at undgå tørretumbler.
      </div>

      <button id="question3">Kan jeg returnere tøj?</button>
      <div class="answer" id="answer3">
        Ja, du kan returnere dit køb inden for 30 dage, hvis varen ikke er
        brugt.
      </div>

      <button id="question4">Hvor lang er leveringstiden?</button>
      <div class="answer" id="answer4">
        Levering tager normalt 2-4 hverdage i Danmark.
      </div>
    </div>
  </body>
  <script>
    document.querySelector("#question1").addEventListener("click", function () {
      document.querySelector("#answer1").classList.toggle("show");
    });
    document.querySelector("#question2").addEventListener("click", function () {
      document.querySelector("#answer2").classList.toggle("show");
    });
    document.querySelector("#question3").addEventListener("click", function () {
      document.querySelector("#answer3").classList.toggle("show");
    });
    document.querySelector("#question4").addEventListener("click", function () {
      document.querySelector("#answer4").classList.toggle("show");
    });
  </script>
</html>
