<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Off Canvas Menu</title>
    <style>
      /* Design af boksen */
      .box {
        width: 120px; /* boksens bredde */
        height: 120px; /* boksens højde */
        background: steelblue; /* farve på boksen */
        transition: transform 0.5s; /* gør animationen glidende */
      }

      .box.active {
        transform: translateX(80px); /* flytter boksen 80px mod højre */
      }

      body {
        font-family: Arial, sans-serif;
        margin: 0;
      }

      #menuBtn,
      #closeBtn {
        padding: 10px 16px;
        margin: 20px;
        cursor: pointer;
      }

      .offcanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 250px;
        height: 100vh;
        background: #222;
        color: white;
        padding: 20px;
        box-sizing: border-box;

        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      .offcanvas.open {
        transform: translateX(0);
      }

      .offcanvas ul {
        list-style: none;
        padding: 0;
        margin-top: 30px;
      }

      .offcanvas li {
        margin-bottom: 16px;
      }

      .offcanvas a {
        color: white;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <!--
    <button id="animation">Klik mig</button>
    <button id="reset">Reset</button>
    <button id="toggle">Toggle</button>
    <div class="box">Hello world</div>-->

    <button id="menuBtn">Åbn menu</button>
    <nav class="offcanvas" id="offcanvasMenu">
      <button id="closeBtn">Luk</button>
      <ul>
        <li><a href="#">Forside</a></li>
        <li><a href="#"></a>Om os</li>
        <li><a href="#"></a>Kontakt</li>
      </ul>
    </nav>
  </body>

  <script>
    document.querySelector("#menuBtn").addEventListener("click", function () {
      document.querySelector(".offcanvas").classList.add("open");
    });
    document.querySelector("#closeBtn").addEventListener("click", function () {
      document.querySelector(".offcanvas").classList.remove("open");
    });
    /*
    document.querySelector("#reset").addEventListener("click", function () {
      document.querySelector(".box").classList.remove("active");
    });
    document.querySelector("#toggle").addEventListener("click", function () {
      document.querySelector(".box").classList.toggle("active");
    });
*/
    console.log("Hello world");
  </script>
</html>
