<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Css Grid Øvelser 5</title>
   <style>
   .container {
  background: #ccc;
  padding: 10px;
  
  /*Gør elementet til et grid*/
  display: grid;
  /*Opdeler i kolonner*/ /*Bredden på kollonerne 
  - fr er den foretrukkene enhed. 
  - fr=fraction=enhed. antalet af fr, udgører altid 100%
  - Hvis der er flere elementer en fr, 
    bliver de flyttet til næste linje   - Alternativt repeat(4,1fr) for 4 kolloner m. bredde på 1fr*/
  grid-template-columns: 1fr 1fr 1fr 1fr;

  /*Skaber gutter mellem kollonerne*/
  gap: 20px;
}
.kasse {
  background: rgb(160, 204, 71);
  padding: 10px;
  color: white;
  font-family:
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    Oxygen,
    Ubuntu,
    Cantarell,
    "Open Sans",
    "Helvetica Neue",
    sans-serif;
}
.two{
    /*Definerer start/slut kollone for det enkelte element - Den går til 5, hvis der er 4 kolloner*/
  grid-column: 2/5;
}
.three{
  grid-column: 1/3;
}
.four{
  grid-column: 3/5;

}
.five {
  grid-column: 3/5;
  grid-row: 3/4;
}
.six{
  /* span definerer antallet af kolloner elementet skal fylde*/
  grid-column: span 4;
}

/**/
</style>
  </head>


  <body>
       <div class="container">
      <div class="kasse">1</div>
      <div class="kasse two">2</div>
      <div class="kasse three">3</div>
      <div class="kasse four">4</div>
      <div class="kasse five">5</div>
       <div class="kasse six">6</div>
 
    
    </div>
  </body>
  </body>
</html>
