<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opgaver 3</title>
  </head>
  <body>
    <h2>Write a message</h2>

    <input id="messageInput" type="text" placeholder="Write something" />

    <p>Characters: <span id="count">0</span></p>
  </body>

  <script>
    //Funktion: Der tæller anslag
    function countCharacters() {
      //Optælling = Textindholdet i count tagget
      const count = document.getElementById("count").textContent;
      //Nyt tal = input i tekstboksen omdandet til værdi baseret på længden
      const newCount = document.getElementById("messageInput").value.length;
      // Indholdet i "count" = Det nye tal
      document.getElementById("count").textContent = newCount;
    }
    //Aktivering af funktionen:

    document
      //peger på messageInput
      .getElementById("messageInput")
      //Aktiverer funktionen "countCharacters" når der kommer input. Input = Ansalg.
      .addEventListener("input", countCharacters);
  </script>
</html>
