<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opgave 1</title>
    <style></style>
  </head>

  <body>
    <!--Opgave 1-->
    <p id="message">Hello</p>

    <button id="changeText">Change text</button>

    <!--Opgave 2-->
    <p id="text">This text can disapear</p>

    <button id="hideButton">Hide text</button>

    <!--Opgave 3-->
    <button id="colorButton">Change background</button>
  </body>

  <script>
    //--Opgave 1--
    document
      .getElementById("changeText")
      .addEventListener("click", function () {
        document.getElementById("message").textContent = "Hello JavaScipt";
      });
    //--Opgave 2--
    document
      .getElementById("hideButton")
      .addEventListener("click", function () {
        document.getElementById("text").textContent = " ";
      });
    //--Opgave 3--

    document
      .getElementById("colorButton")
      .addEventListener("click", function () {
        //fanger id på body, og ændrer farven
        document.body.style.background = "#ffff00";
      });
  </script>
</html>
