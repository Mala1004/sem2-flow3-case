<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
    <script type="text/javascript">
      (function () {
        // https://dashboard.emailjs.com/admin/account
        emailjs.init({
          publicKey: "ED_7nGdcX-ZZycTiI",
        });
      })();
    </script>
    <script type="text/javascript">
      window.onload = function () {
        document
          .getElementById("contact-form")
          .addEventListener("submit", function (event) {
            event.preventDefault();
            // these IDs from the previous steps
            emailjs.sendForm("service_0kovp2n", "template_ys3ao0h", this).then(
              () => {
                console.log("SUCCESS!");
              },
              (error) => {
                console.log("FAILED...", error);
              },
            );
            alert("Din besked er sendt");
          });
      };
    </script>
    <link rel="stylesheet" href="styleshop.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Crimson Pro"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--Topnav-->
    <header>
      <!--Logo-->
      <a href="index.html">
        <div class="logo"><img src="img/logo/Logo 1.png" alt="" /></div
      ></a>

      <!--Knap - Menu-->
      <button id="menuBtn">
        <div class="burger"></div>
        <div class="burger"></div>
        <div class="burger"></div>
      </button>
      <!--Off canvas navigation-->
      <nav class="offcanvas" id="offcanvasMenu">
        <button id="closeBtn">x</button>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a href="omos.html">About</a></li>
          <li><a href="kontakt.html">Contact</a></li>
        </ul>
      </nav>
    </header>
    <!--Overlay, til aktiv menu-->
    <div class="overlay"></div>
    <!--Indhold-->
    <h1>Contact</h1>

    <div class="formularen">
      <p class="kontakt-p">
        Have a question or want to reach out? Fill out the form below and send
        us a message—we’ll get back to you as soon as possible.
      </p>
      <form id="contact-form" class="contact-form">
        <!-- HTML til kontaktformular -->
        <input type="hidden" name="time" value="Mar 10 2025 08:46" />
        <label>Name</label>
        <input type="text" name="name" required />
        <label>Email</label>
        <input type="email" name="email" required />
        <label>Subject</label>
        <input type="text" name="title" required />
        <label>Message</label>
        <textarea name="message" required></textarea>
        <input id="send" type="submit" value="Send" />
      </form>
    </div>
    <!--Javascript-->
    <script src="styleshop.js"></script>
  </body>
</html>
